reward_model:
  reward_manager: batch
actor_rollout_ref:
  rollout:
    val_kwargs:
      temperature: 0.0
      do_sample: true
    tensor_model_parallel_size: 1
    temperature: 1.0
    gpu_memory_utilization: 0.9
    dtype: bfloat16
    n: 4
    log_prob_micro_batch_size_per_gpu: 8
  actor:
    optim:
      lr: 0.000001
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    ppo_epochs: 1
    kl_loss_coef: 0.00
    use_kl_loss: true
  ref:
    log_prob_micro_batch_size_per_gpu: 4
  model:
    path: meta-llama/Llama-3.2-1B-Instruct
    use_fused_kernels: true
    use_remove_padding: true
    enable_activation_offload: true
algorithm:
  groupless_advantage: true
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.0
data:
  truncation: right
  max_prompt_length: 1024
  max_response_length: 128
  # 256 prompts x rollout.n=4 = 1024 synthetic examples per reward step, which
  # equals the server's microbatch_size(8) * grad_accumulation_steps(128) = 1024,
  # so each reward step is exactly ONE metagrad step. 256 -> 120 GRPO steps (3 epochs).
  train_batch_size: 256
  prompt_ending_to_force_path: prompt_data/prompt_ending_to_force.txt
  train_files: prompt_data/wikipedia_train.parquet
  val_files: prompt_data/wikipedia_test.parquet
trainer:
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 40
  max_actor_ckpt_to_keep: 1  # keep only the latest RL checkpoint
  test_freq: 5
  total_epochs: 9
  log_val_generations: 1024
ray_init:
  num_cpus: 16 
