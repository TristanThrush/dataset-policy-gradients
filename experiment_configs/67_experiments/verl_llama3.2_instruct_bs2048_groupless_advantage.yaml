reward_model:
  reward_manager: batch
actor_rollout_ref:
  rollout:
    val_kwargs:
      temperature: 1.0
      do_sample: true
    tensor_model_parallel_size: 1
    temperature: 1.0
    gpu_memory_utilization: 0.9
    dtype: bfloat16
    n: 4
    log_prob_micro_batch_size_per_gpu: 8
  actor:
    optim:
      lr: 0.000005
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    ppo_epochs: 1
    kl_loss_coef: 0.00
    use_kl_loss: true
  ref:
    log_prob_micro_batch_size_per_gpu: 4
  model:
    path: meta-llama/Llama-3.2-1B-Instruct
    use_fused_kernels: true
    use_remove_padding: true
    enable_activation_offload: true
algorithm:
  groupless_advantage: true
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.0
data:
  truncation: right
  max_prompt_length: 1024
  max_response_length: 128
  # Batch-size sweep, all three jobs see the same #examples overall
  # (256*3840 = 2048*480 = 24576*40 = 983040 prompts):
  # 2048 prompts x rollout.n=4 = 8192 rollouts/step = 8 * server microbatch(128)*grad_accum(8),
  # so the server does 8 metagrad batches per reward step. 480 GRPO steps.
  train_batch_size: 2048
  prompt_ending_to_force_path: prompt_data/prompt_ending_to_force.txt
  train_files: prompt_data/wikipedia_train_large.parquet
  val_files: prompt_data/wikipedia_test_large.parquet
trainer:
  n_gpus_per_node: 8
  nnodes: 1
  # Checkpoint every step so a preempt+requeue (round-robin scheduler, ~6h) never
  # loses more than the in-progress step. Bounded disk: max_actor_ckpt_to_keep=1
  # keeps only the latest actor checkpoint (GRPO: no critic).
  save_freq: 1
  max_actor_ckpt_to_keep: 1
  # Validate every 10 GRPO steps. Validation uses the wikipedia_test_large file
  # (98304 rollouts -> 96 server metagrad batches), the same for all three jobs.
  test_freq: 10
  total_epochs: 480
  total_training_steps: 480
  log_val_generations: 1024
ray_init:
  num_cpus: 16
