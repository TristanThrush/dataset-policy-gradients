# Flattened standalone config (originally the cross_group_batching server preset from dataset_metagradients_jax/conf/).
# Self-contained: no hydra `defaults:`, so it lives anywhere without config.yaml/model/large.yaml siblings.
tokenizer_name: meta-llama/Llama-3.2-1B-Instruct
tokenizer_kwargs: {}
dtype: fp32
sequence_length: 128
microbatch_size: 8
grad_accumulation_steps: 128
total_batches: 1
jax_cache_dir: ${oc.env:LOCAL_FAST_STORAGE}/.jax_cache
checkpoint_dir: ${oc.env:LOCAL_FAST_STORAGE}/checkpoints
seed: 42
optimizer_type: sgd
learning_rate: 6.4e-5
weight_decay: 0.0001
eps_root: 1.0e-09
eps: 1.0e-08
b1: 0.9
b2: 0.95
warmup_steps: null
use_manual_vjp: true
use_wandb: true
wandb_project: dataset-metagradients-jax
wandb_entity: null
wandb_name: null
wandb_mode: online
wandb_tags: []
easydel_pretrained_override: meta-llama/Llama-3.2-1B-Instruct
target_metric_type: val_language_modeling
cross_group_batching: true
naive_metagrad_server: false

# Build the val/target benchmark in-process from an lm-eval task (instead of
# loading a pre-tokenized dataset). Tokenized with tokenizer_name.
eleuther_benchmark_lm_eval_tasks: lambada_openai_mt_it_custom_splits
eleuther_benchmark_split: train
eleuther_benchmark_random_sample_ratio: null
eleuther_benchmark_add_data_source: false
eleuther_benchmark_shuffle: false
